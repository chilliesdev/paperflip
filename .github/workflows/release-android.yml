name: Release Android APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for tagging

      - name: Determine Next Version
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true # We calculate it first, then use it in the build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Update App Version
        if: steps.tag_version.outputs.new_tag != ''
        run: |
          # Inject the new version and a unique versionCode into app.json
          NEW_VERSION="${{ steps.tag_version.outputs.new_version }}"
          VERSION_CODE="${{ github.run_number }}"
          echo "Updating app.json to version $NEW_VERSION (code: $VERSION_CODE)"
          
          # Use jq to update app.json in place
          jq ".expo.version = \"$NEW_VERSION\" | .expo.android.versionCode = $VERSION_CODE" apps/mobile/app.json > apps/mobile/app.json.tmp && mv apps/mobile/app.json.tmp apps/mobile/app.json

      - name: Expo Prebuild
        if: steps.tag_version.outputs.new_tag != ''
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean

      - name: Patch Android Build.gradle for AsyncStorage
        if: steps.tag_version.outputs.new_tag != ''
        run: |
          # The prebuild generates the android/ folder. We need to add the local repo for async-storage
          # because pnpm's symlinking structure can confuse the default gradle autolinking.
          sed -i '/allprojects {/,/repositories {/!b;/repositories {/a \        maven { url "$rootDir/../node_modules/@react-native-async-storage/async-storage/android/local_repo" }' apps/mobile/android/build.gradle

      - name: Patch react-native-pdf-thumbnail for Kotlin Type Mismatch
        if: steps.tag_version.outputs.new_tag != ''
        run: |
          # Fix Kotlin null-safety error in react-native-pdf-thumbnail caused by newer SDK versions.
          FILE=$(find node_modules -name PdfThumbnailModule.kt)
          if [ -n "$FILE" ]; then
            echo "Patching $FILE"
            echo "Before patch:"
            grep "bitmap.config" "$FILE" || echo "bitmap.config not found!"
            
            # Match bitmap.config with or without !! and replace with ARGB_8888
            sed -i 's/bitmap.config\(!!\)\?/Bitmap.Config.ARGB_8888/g' "$FILE"
            
            echo "After patch:"
            grep "Bitmap.Config.ARGB_8888" "$FILE"
          else
            echo "PdfThumbnailModule.kt not found"
          fi

      - name: Build Android APK
        if: steps.tag_version.outputs.new_tag != ''
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"

      - name: Finalize Tag
        if: steps.tag_version.outputs.new_tag != ''
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ steps.tag_version.outputs.new_version }}
          tag_prefix: v

      - name: Create GitHub Release
        if: steps.tag_version.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          files: |
            apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
